name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        # npm 10.x intermittently dies with "Exit handler never called!" on
        # clean installs; newer npm fixes it. Upgrade + retry for resilience.
        run: |
          npm install -g npm@latest || npm install -g npm@latest
          npm ci || npm ci || npm ci
      - run: npm run check
      - run: npm run test:unit

  fullstack-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crochet
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: |
          npm install -g npm@latest || npm install -g npm@latest
          npm ci || npm ci || npm ci
      - name: Create base tables
        run: psql postgresql://postgres:postgres@localhost:5432/crochet -f scripts/create-base-tables.sql
      - name: Boot the real server and run the API smoke
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crochet
          PORT: 5000
        run: |
          npx tsx server/index.ts > server.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:5000/api/profiles >/dev/null && break
            sleep 1
          done
          sleep 8   # let the one-time seeds finish
          npm run smoke || (tail -50 server.log; exit 1)

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: |
          npm install -g npm@latest || npm install -g npm@latest
          npm ci || npm ci || npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
