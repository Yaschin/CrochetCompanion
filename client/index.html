<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Crochet Time</title>
    <meta name="theme-color" content="#FBF8F2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito+Sans:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app-shell-loader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(155deg,#F9EDD8 0%,#F2E4CE 35%,#EDD5B8 70%,#F2E4CE 100%);gap:16px;font-family:'Dancing Script',cursive,serif;">
      <div style="font-size:64px;animation:spin-yarn 2s ease-in-out infinite;">🧶</div>
      <p style="font-size:2rem;color:#A83050;font-weight:700;margin:0;letter-spacing:0.02em;">Crochet Time</p>
      <p style="font-size:0.8rem;color:#9A7868;margin:0;letter-spacing:0.15em;text-transform:uppercase;font-family:sans-serif;">Loading your studio…</p>
      <style>@keyframes spin-yarn{0%,100%{transform:rotate(-8deg) scale(1);}50%{transform:rotate(8deg) scale(1.08);}}</style>
    </div>
    <div id="root"></div>
    <script>
      (function(){var r=document.getElementById('root');var l=document.getElementById('app-shell-loader');if(!l)return;var o=new MutationObserver(function(){if(r&&r.children.length>0){l.style.opacity='0';l.style.transition='opacity 0.4s';setTimeout(function(){l.remove();},420);o.disconnect();}});o.observe(r,{childList:true});setTimeout(function(){if(l&&l.parentNode){l.style.opacity='0';l.style.transition='opacity 0.4s';setTimeout(function(){if(l.parentNode)l.remove();},420);}},6000);})();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
